<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>プランクタイマー</title>
<style>
  :root {
    --bg: #FAF8F4;
    --surface: #FFFFFF;
    --surface-line: #E9E4D9;
    --ink: #1B1F23;
    --ink-dim: #7A7367;
    --ink-faint: #B4AEA1;
    --keep: #E8531F;
    --keep-glow: rgba(232, 83, 31, 0.14);
    --rest: #12968F;
    --rest-glow: rgba(18, 150, 143, 0.14);
    --ring-track: #E7E2D6;
    --accent: var(--keep);
    --accent-glow: var(--keep-glow);
    --shadow: 0 1px 2px rgba(27, 31, 35, 0.04), 0 12px 32px -16px rgba(27, 31, 35, 0.18);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14181C;
      --surface: #1B2025;
      --surface-line: #2A3038;
      --ink: #F2EFE9;
      --ink-dim: #9B9A94;
      --ink-faint: #5B5F63;
      --keep: #FF6B35;
      --keep-glow: rgba(255, 107, 53, 0.16);
      --rest: #3DDAD7;
      --rest-glow: rgba(61, 218, 215, 0.14);
      --ring-track: #262C33;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 20px 48px -20px rgba(0, 0, 0, 0.6);
    }
  }

  :root[data-theme="dark"] {
    --bg: #14181C;
    --surface: #1B2025;
    --surface-line: #2A3038;
    --ink: #F2EFE9;
    --ink-dim: #9B9A94;
    --ink-faint: #5B5F63;
    --keep: #FF6B35;
    --keep-glow: rgba(255, 107, 53, 0.16);
    --rest: #3DDAD7;
    --rest-glow: rgba(61, 218, 215, 0.14);
    --ring-track: #262C33;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 20px 48px -20px rgba(0, 0, 0, 0.6);
  }

  :root[data-theme="light"] {
    --bg: #FAF8F4;
    --surface: #FFFFFF;
    --surface-line: #E9E4D9;
    --ink: #1B1F23;
    --ink-dim: #7A7367;
    --ink-faint: #B4AEA1;
    --keep: #E8531F;
    --keep-glow: rgba(232, 83, 31, 0.14);
    --rest: #12968F;
    --rest-glow: rgba(18, 150, 143, 0.14);
    --ring-track: #E7E2D6;
    --shadow: 0 1px 2px rgba(27, 31, 35, 0.04), 0 12px 32px -16px rgba(27, 31, 35, 0.18);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN",
      "Yu Gothic UI", "Segoe UI", "Noto Sans JP", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .page {
    width: 100%;
    max-width: 420px;
  }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--surface-line);
    border-radius: 28px;
    box-shadow: var(--shadow);
    padding: 32px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    overflow: hidden;
    transition: box-shadow 0.4s ease;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 18%, var(--accent-glow), transparent 60%);
    opacity: 0.9;
    transition: background 0.5s ease;
    pointer-events: none;
  }

  .masthead {
    position: relative;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  h1 {
    margin: 0;
    font-size: 21px;
    font-weight: 750;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-size: 13px;
    color: var(--ink-dim);
  }

  .ring-wrap {
    position: relative;
    width: 248px;
    height: 248px;
  }

  .ring-wrap > svg { width: 100%; height: 100%; transform: rotate(-90deg); }

  .ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 12;
  }

  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 12;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.12s linear, stroke 0.4s ease;
  }

  .ring-progress.urgent { filter: drop-shadow(0 0 6px var(--accent-glow)); }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .phase-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    transition: color 0.4s ease;
  }

  .time {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", "DejaVu Sans Mono", monospace;
    font-variant-numeric: tabular-nums;
    font-size: 64px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .set-of {
    font-size: 12px;
    color: var(--ink-faint);
  }

  .check-icon {
    width: 56px;
    height: 56px;
    color: var(--rest);
  }

  .dots {
    position: relative;
    display: flex;
    gap: 10px;
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--ring-track);
    border: 1.5px solid transparent;
    transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
  }

  .dot.done { background: var(--keep); }
  .dot.active {
    background: transparent;
    border-color: var(--keep);
    transform: scale(1.35);
  }

  .tip {
    position: relative;
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--surface-line);
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink);
    text-align: center;
    min-height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tip strong { color: var(--accent); font-weight: 700; }

  .controls {
    position: relative;
    width: 100%;
    display: flex;
    gap: 10px;
  }

  button {
    font-family: inherit;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    padding: 14px 0;
    transition: transform 0.15s ease, filter 0.15s ease, background 0.3s ease;
  }

  button:active { transform: scale(0.97); }

  button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #FFFFFF;
  }

  .btn-primary:hover { filter: brightness(1.06); }

  .btn-secondary {
    flex: 0 0 92px;
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--surface-line);
  }

  .btn-secondary:hover { color: var(--ink); border-color: var(--ink-faint); }

  .hint {
    position: relative;
    font-size: 11px;
    color: var(--ink-faint);
    text-align: center;
  }

  kbd {
    font-family: ui-monospace, "SF Mono", monospace;
    background: var(--bg);
    border: 1px solid var(--surface-line);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
  }

  @media (prefers-reduced-motion: reduce) {
    .ring-progress, .dot, .card, button { transition: none !important; }
  }

  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="page">
  <div class="card" id="card">
    <div class="masthead">
      <div class="eyebrow">BEGINNER PLANK</div>
      <h1>プランクタイマー</h1>
      <div class="subtitle">20秒キープ ×3セット・休憩10秒</div>
    </div>

    <div class="ring-wrap">
      <svg viewBox="0 0 200 200">
        <circle class="ring-track" cx="100" cy="100" r="90"></circle>
        <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="90"></circle>
      </svg>
      <div class="ring-center" id="ringCenter">
        <div class="phase-label" id="phaseLabel">準備</div>
        <div class="time" id="timeDisplay">20</div>
        <div class="set-of" id="setOf">セット 1 / 3</div>
      </div>
    </div>

    <div class="dots" id="dots">
      <div class="dot" data-set="0"></div>
      <div class="dot" data-set="1"></div>
      <div class="dot" data-set="2"></div>
    </div>

    <div class="tip" id="tip" aria-live="polite">スタートを押して始めましょう。</div>

    <div class="controls">
      <button class="btn-secondary" id="resetBtn" type="button">リセット</button>
      <button class="btn-primary" id="startBtn" type="button">スタート</button>
    </div>

    <div class="hint"><kbd>Space</kbd> 開始/一時停止　<kbd>R</kbd> リセット</div>
    <div class="sr-only" id="liveRegion" aria-live="polite"></div>
  </div>
</div>

<script>
(function () {
  var phases = [
    { type: 'keep', duration: 20, setNumber: 1 },
    { type: 'rest', duration: 10 },
    { type: 'keep', duration: 20, setNumber: 2 },
    { type: 'rest', duration: 10 },
    { type: 'keep', duration: 20, setNumber: 3 }
  ];

  var tips = [
    '床に肘とつま先。頭からかかとまで一直線に。',
    'お腹に力を入れて、腰が落ちないように。',
    'あと少し。呼吸を止めずに、目線は下へ。'
  ];
  var restMessage = 'しっかり呼吸して、力を抜いてリラックス。';
  var idleMessage = 'スタートを押して始めましょう。';
  var doneMessage = 'お疲れ様でした。3セット完了です。';

  var card = document.getElementById('card');
  var ringProgress = document.getElementById('ringProgress');
  var phaseLabel = document.getElementById('phaseLabel');
  var timeDisplay = document.getElementById('timeDisplay');
  var setOf = document.getElementById('setOf');
  var tipEl = document.getElementById('tip');
  var startBtn = document.getElementById('startBtn');
  var resetBtn = document.getElementById('resetBtn');
  var dots = Array.prototype.slice.call(document.querySelectorAll('.dot'));
  var liveRegion = document.getElementById('liveRegion');
  var ringCenter = document.getElementById('ringCenter');

  var CIRCUMFERENCE = 2 * Math.PI * 90;
  ringProgress.style.strokeDasharray = CIRCUMFERENCE.toFixed(2);
  ringProgress.style.strokeDashoffset = '0';

  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var phaseIndex = 0;
  var phaseElapsedMs = 0;
  var running = false;
  var completed = false;
  var lastFrameTime = null;
  var intervalId = null;
  var tickedSeconds = null;

  var audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, startOffset, dur, type, peak) {
    if (!audioCtx) return;
    var t0 = audioCtx.currentTime + startOffset;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(peak || 0.18, t0 + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  function playTick(remainingSec) {
    var freqs = { 3: 660, 2: 784, 1: 988 };
    playTone(freqs[remainingSec] || 660, 0, 0.11, 'sine', 0.16);
  }

  function playTransition(toType) {
    if (toType === 'rest') {
      playTone(784, 0, 0.16, 'sine', 0.18);
      playTone(523, 0.13, 0.2, 'sine', 0.16);
    } else {
      playTone(523, 0, 0.13, 'sine', 0.18);
      playTone(784, 0.1, 0.2, 'sine', 0.18);
    }
  }

  function playCompletion() {
    [523, 659, 784, 1047].forEach(function (f, i) {
      playTone(f, i * 0.12, 0.28, 'sine', 0.2);
    });
  }

  function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  function currentPhase() { return phases[phaseIndex]; }

  function setAccent(type) {
    card.classList.remove('phase-keep', 'phase-rest');
    if (type === 'keep') {
      card.style.setProperty('--accent', 'var(--keep)');
      card.style.setProperty('--accent-glow', 'var(--keep-glow)');
    } else if (type === 'rest') {
      card.style.setProperty('--accent', 'var(--rest)');
      card.style.setProperty('--accent-glow', 'var(--rest-glow)');
    }
  }

  function updateDots() {
    dots.forEach(function (dot, i) {
      var phaseArrIndex = i * 2;
      dot.classList.remove('done', 'active');
      if (completed || phaseIndex > phaseArrIndex) {
        dot.classList.add('done');
      } else if (phaseIndex === phaseArrIndex) {
        dot.classList.add('active');
      }
    });
  }

  function renderPhaseStart() {
    var phase = currentPhase();
    setAccent(phase.type);
    tickedSeconds = {};
    if (phase.type === 'keep') {
      phaseLabel.textContent = 'キープ';
      setOf.textContent = 'セット ' + phase.setNumber + ' / 3';
      tipEl.innerHTML = tips[phase.setNumber - 1];
      liveRegion.textContent = 'セット ' + phase.setNumber + ' キープ開始';
    } else {
      phaseLabel.textContent = '休憩';
      setOf.textContent = '次のセットへ';
      tipEl.textContent = restMessage;
      liveRegion.textContent = '休憩開始';
    }
    updateDots();
    updateDisplay(phase.duration * 1000, phase.duration * 1000);
  }

  function updateDisplay(remainingMs, durationMs) {
    var remainingSec = Math.max(0, Math.ceil(remainingMs / 1000));
    timeDisplay.textContent = remainingSec;
    var frac = 1 - (remainingMs / durationMs);
    var offset = CIRCUMFERENCE * Math.min(1, Math.max(0, frac));
    ringProgress.style.strokeDashoffset = offset.toFixed(2);
    if (remainingSec <= 3 && remainingSec > 0 && !completed) {
      ringProgress.classList.toggle('urgent', !reduceMotion);
    } else {
      ringProgress.classList.remove('urgent');
    }
  }

  function checkBeeps(remainingMs) {
    var remainingSec = Math.ceil(remainingMs / 1000);
    if (remainingSec <= 3 && remainingSec >= 1 && !tickedSeconds[remainingSec]) {
      tickedSeconds[remainingSec] = true;
      playTick(remainingSec);
      vibrate(40);
    }
  }

  function tick() {
    if (!running) return;
    var now = Date.now();
    if (lastFrameTime === null) lastFrameTime = now;
    var delta = now - lastFrameTime;
    lastFrameTime = now;
    phaseElapsedMs += delta;
    var phase = currentPhase();
    var durationMs = phase.duration * 1000;
    var remainingMs = durationMs - phaseElapsedMs;
    if (remainingMs <= 0) {
      updateDisplay(0, durationMs);
      advancePhase();
      return;
    }
    updateDisplay(remainingMs, durationMs);
    checkBeeps(remainingMs);
  }

  function runInterval() {
    if (intervalId) clearInterval(intervalId);
    intervalId = setInterval(tick, 100);
  }

  function advancePhase() {
    phaseIndex++;
    phaseElapsedMs = 0;
    if (phaseIndex >= phases.length) {
      finish();
      return;
    }
    var nextPhase = currentPhase();
    playTransition(nextPhase.type);
    vibrate(nextPhase.type === 'keep' ? [80, 40, 80] : [120]);
    renderPhaseStart();
    lastFrameTime = null;
  }

  function finish() {
    running = false;
    completed = true;
    setAccent('rest');
    phaseLabel.textContent = '完了';
    setOf.textContent = '';
    ringProgress.style.strokeDashoffset = '0';
    ringProgress.classList.remove('urgent');
    ringCenter.innerHTML =
      '<svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>' +
      '<div class="time" style="font-size:20px;margin-top:8px;">完了</div>';
    tipEl.textContent = doneMessage;
    liveRegion.textContent = doneMessage;
    updateDots();
    playCompletion();
    vibrate([100, 50, 100, 50, 300]);
    startBtn.textContent = 'もう一度';
  }

  function start() {
    if (running || completed) {
      if (completed) reset();
      else return;
    }
    ensureAudio();
    if (phaseIndex === 0 && phaseElapsedMs === 0) renderPhaseStart();
    running = true;
    lastFrameTime = null;
    startBtn.textContent = '一時停止';
    runInterval();
  }

  function pause() {
    running = false;
    if (intervalId) { clearInterval(intervalId); intervalId = null; }
    startBtn.textContent = 'スタート';
  }

  function toggle() {
    if (completed) { start(); return; }
    if (running) pause(); else start();
  }

  function reset() {
    pause();
    completed = false;
    phaseIndex = 0;
    phaseElapsedMs = 0;
    ringCenter.innerHTML =
      '<div class="phase-label" id="phaseLabel">準備</div>' +
      '<div class="time" id="timeDisplay">20</div>' +
      '<div class="set-of" id="setOf">セット 1 / 3</div>';
    phaseLabel = document.getElementById('phaseLabel');
    timeDisplay = document.getElementById('timeDisplay');
    setOf = document.getElementById('setOf');
    setAccent('keep');
    phaseLabel.textContent = '準備';
    timeDisplay.textContent = phases[0].duration;
    setOf.textContent = 'セット 1 / 3';
    tipEl.textContent = idleMessage;
    ringProgress.style.strokeDashoffset = '0';
    ringProgress.classList.remove('urgent');
    updateDots();
    startBtn.textContent = 'スタート';
  }

  startBtn.addEventListener('click', function () { toggle(); startBtn.blur(); });
  resetBtn.addEventListener('click', function () { reset(); resetBtn.blur(); });

  document.addEventListener('keydown', function (e) {
    if (e.code === 'Space') {
      e.preventDefault();
      toggle();
    } else if (e.code === 'KeyR') {
      e.preventDefault();
      reset();
    }
  });

  setAccent('keep');
  updateDots();
})();
</script>
</body>
</html>
